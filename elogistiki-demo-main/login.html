<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Σύνδεση Admin | e-logistiki</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:     '#1a2e5a',
            navyDark: '#111e3d',
            accent:   '#3b5fc0',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background: linear-gradient(135deg, #1a2e5a 0%, #111e3d 100%);
      min-height: 100vh;
    }
    input:focus {
      outline: none;
      border-color: #3b5fc0;
      box-shadow: 0 0 0 3px rgba(59,95,192,.2);
    }
    #loginBtn { transition: background .2s, transform .1s; }
    #loginBtn:active { transform: scale(.98); }
    #errorMsg { transition: opacity .3s ease; }
  </style>
</head>
<body class="font-sans flex items-center justify-center min-h-screen px-4">

  <div class="w-full max-w-sm">

    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <img src="logo.png" alt="Λογότυπο ΠΙΠΙΛΗ ΑΝΝΑ" class="h-24 w-auto mx-auto" />
      <p class="text-white/50 text-sm mt-1">Πρόσβαση Διαχειριστή</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">

      <!-- Error message (hidden by default) -->
      <div id="errorMsg" class="hidden mb-5 flex items-center gap-2.5 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-3">
        <i class="fas fa-circle-exclamation shrink-0"></i>
        <span id="errorText">Λανθασμένα στοιχεία σύνδεσης.</span>
      </div>

      <form id="loginForm" novalidate class="space-y-5">

        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1.5" for="email">
            Email
          </label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input id="email" type="email" placeholder="admin@e-logistiki.gr" autocomplete="email"
                   class="w-full border border-gray-200 rounded-lg pl-10 pr-4 py-2.5 text-sm transition-all" />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1.5" for="password">
            Κωδικός
          </label>
          <div class="relative">
            <i class="fas fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
                   class="w-full border border-gray-200 rounded-lg pl-10 pr-10 py-2.5 text-sm transition-all" />
            <button type="button" id="togglePwd"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
              <i id="toggleIcon" class="fas fa-eye text-sm"></i>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button id="loginBtn" type="submit"
                class="w-full bg-navy hover:bg-navyDark text-white font-semibold py-2.5 rounded-lg text-sm flex items-center justify-center gap-2 mt-1">
          <i id="btnIcon" class="fas fa-arrow-right-to-bracket"></i>
          <span id="btnText">Σύνδεση</span>
        </button>

      </form>

    </div>

    <!-- Back to site -->
    <p class="text-center mt-5">
      <a href="index.html" class="text-white/50 hover:text-white/80 text-xs transition-colors">
        <i class="fas fa-arrow-left text-[10px] mr-1"></i> Πίσω στο site
      </a>
    </p>

  </div>

<!-- ============================================================
     SUPABASE AUTH LOGIC
============================================================ -->
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL      = 'https://smotabhgpokfvsxjdxmz.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNtb3RhYmhncG9rZnZzeGpkeG16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjEyOTUsImV4cCI6MjA4OTYzNzI5NX0.jW1l6SwtCqQCm4OnWoO8KsIFDl9Pzy-KQ9TQvuPJ8Ew';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── If already authenticated, skip login ────────────────────
  const { data: { session } } = await supabase.auth.getSession();
  if (session) window.location.href = 'admin-blog.html';

  // ── Password visibility toggle ───────────────────────────────
  document.getElementById('togglePwd').addEventListener('click', () => {
    const pwd  = document.getElementById('password');
    const icon = document.getElementById('toggleIcon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.className = 'fas fa-eye-slash text-sm';
    } else {
      pwd.type = 'password';
      icon.className = 'fas fa-eye text-sm';
    }
  });

  // ── Login form submit ────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    const errorTxt = document.getElementById('errorText');
    const btn      = document.getElementById('loginBtn');
    const btnIcon  = document.getElementById('btnIcon');
    const btnText  = document.getElementById('btnText');

    // Basic validation
    if (!email || !password) {
      errorTxt.textContent = 'Συμπληρώστε email και κωδικό.';
      errorMsg.classList.remove('hidden');
      return;
    }

    // Loading state
    btn.disabled   = true;
    btnIcon.className = 'fas fa-spinner fa-spin';
    btnText.textContent = 'Σύνδεση…';
    errorMsg.classList.add('hidden');

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      errorTxt.textContent = 'Λανθασμένα στοιχεία σύνδεσης. Δοκιμάστε ξανά.';
      errorMsg.classList.remove('hidden');
      btn.disabled      = false;
      btnIcon.className = 'fas fa-arrow-right-to-bracket';
      btnText.textContent = 'Σύνδεση';
    } else {
      btnIcon.className  = 'fas fa-check';
      btnText.textContent = 'Επιτυχία!';
      setTimeout(() => window.location.href = 'admin-blog.html', 400);
    }
  });
</script>

  <!-- UserWay Accessibility Widget -->
  <script src="https://cdn.userway.org/widget.js" data-account="3zdxx06sOy" data-position="2" data-size="large"></script>
</body>
</html>
